# Product term mappings for query expansion in the recommender pipeline.
# Two sections: acronyms (word-boundary matched) and synonyms (phrase-matched).
# Both are case-insensitive. Expansion appends the value in parentheses.
# To update: edit this file, commit, rebuild image.

acronyms:
