# Curated mapping: AgnosticD v2 workload roles -> human-readable product names.
# Descriptions are placeholders from meta/main.yml — will be replaced with
# LLM-verified descriptions from code analysis once the scanner runs.
# Only verified+mapped workloads are queryable by Publishing House.
#
# Run `rcars workload sync` to load into the database.

mappings:
