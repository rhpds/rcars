<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RCARS — RHDP Content Advisor</title>
  <link rel="stylesheet" href="/static/rcars.css">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <script src="https://unpkg.com/alpinejs@3.14.9/dist/cdn.min.js" defer></script>
</head>
<body x-data="{ curatorMode: false }">

  <!-- Top bar with LCARS logo -->
  <header class="rcars-header">
    <svg width="380" height="100" viewBox="0 0 380 100" xmlns="http://www.w3.org/2000/svg" class="rcars-logo">
      <!-- Arc -->
      <path d="M 12 10 A 54 54 0 0 1 66 64 L 84 64 L 84 82 L 56 82 Q 12 82 12 40 Z" fill="#FF9900"/>
      <path d="M 24 28 A 28 28 0 0 1 50 54" stroke="#CC6600" stroke-width="4" fill="none" opacity="0.6"/>
      <!-- Header bars -->
      <rect x="90" y="10" width="140" height="30" rx="5" fill="#FF9900"/>
      <rect x="236" y="10" width="34" height="30" rx="5" fill="#FFCC99"/>
      <rect x="276" y="10" width="60" height="30" rx="5" fill="#9966CC"/>
      <!-- Middle bar -->
      <rect x="90" y="46" width="246" height="18" rx="4" fill="#1c1c2e"/>
      <!-- Bottom bar -->
      <rect x="90" y="70" width="246" height="18" rx="4" fill="#1c1c2e"/>
      <!-- RCARS -->
      <text x="100" y="32" font-family="Arial Black, Impact, sans-serif" font-size="20" font-weight="900" fill="#000" letter-spacing="5">RCARS</text>
      <!-- RHDP CONTENT ADVISOR -->
      <text x="100" y="60" font-family="Arial, sans-serif" font-size="13" fill="#FF9900" letter-spacing="2">RHDP CONTENT ADVISOR</text>
      <!-- Date + currency badge -->
      <text x="100" y="84" font-family="Arial, sans-serif" font-size="11" fill="#FFCC99">{{ db_status.last_refresh }}</text>
      {% if db_status.is_stale %}
      <rect x="180" y="72" width="60" height="16" rx="3" fill="#3a0d0d"/>
      <text x="186" y="84" font-family="Arial Black, sans-serif" font-size="10" font-weight="900" fill="#c9190b">● STALE</text>
      {% else %}
      <rect x="180" y="72" width="72" height="16" rx="3" fill="#0d3a0d"/>
      <text x="186" y="84" font-family="Arial Black, sans-serif" font-size="10" font-weight="900" fill="#5cb85c">● CURRENT</text>
      {% endif %}
    </svg>

    <div class="header-right">
      {% if current_user %}
        {% if is_curator %}
          <button class="curator-toggle" @click="curatorMode = !curatorMode" :class="curatorMode ? 'active' : ''">
            <span x-text="curatorMode ? 'Curator ON' : 'Curator'">Curator</span>
          </button>
        {% endif %}
        <span class="user-email" style="min-width:40px;">{{ current_user }}</span>
      {% endif %}
    </div>
  </header>

  <!-- Body with nav + content -->
  <div class="rcars-body">
    <nav class="rcars-nav">
      <a href="/advisor" class="nav-item {% if active_page == 'advisor' %}active{% endif %}">Advisor</a>
      {% if is_curator %}
      <a href="/curate" class="nav-item {% if active_page == 'curate' %}active{% endif %}">Curate</a>
      {% endif %}
      {% if is_admin %}
      <a href="/admin" class="nav-item {% if active_page == 'admin' %}active{% endif %}">Admin</a>
      {% endif %}

      {% if active_page == 'advisor' %}
      <div class="nav-section-label">HISTORY</div>
      <div id="session-history" x-data="sessionHistory()">
        <template x-for="s in sessions" :key="s.id">
          <a :href="'/advisor?session_id=' + s.id" class="nav-item history-item" x-text="s.label"></a>
        </template>
      </div>
      {% endif %}
    </nav>

    <main class="rcars-main">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script>
  function sessionHistory() {
    return {
      sessions: JSON.parse(localStorage.getItem('rcars_sessions') || '[]').slice(0, 10),
    };
  }

  function saveSession(sessionId, label) {
    const sessions = JSON.parse(localStorage.getItem('rcars_sessions') || '[]');
    const filtered = sessions.filter(s => s.id !== sessionId);
    filtered.unshift({ id: sessionId, label: label.slice(0, 40), ts: Date.now() });
    localStorage.setItem('rcars_sessions', JSON.stringify(filtered.slice(0, 20)));
  }
  </script>
</body>
</html>
