---
- name: Render infra manifests template
  ansible.builtin.template:
    src: manifests-infra.yaml.j2
    dest: "/tmp/rcars-{{ env }}-infra.yaml"
  changed_when: false

- name: Apply infra manifests
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    namespace: "{{ target_namespace }}"
    src: "/tmp/rcars-{{ env }}-infra.yaml"
    state: present
    apply: true

- name: Ensure RCARS API can validate SA tokens (TokenReview access)
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: "rcars-token-review-{{ env }}"
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: system:auth-delegator
      subjects:
        - kind: ServiceAccount
          name: default
          namespace: "{{ target_namespace }}"

- name: Clean up rendered infra manifests
  ansible.builtin.file:
    path: "/tmp/rcars-{{ env }}-infra.yaml"
    state: absent
  changed_when: false
