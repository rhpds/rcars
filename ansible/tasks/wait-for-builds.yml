---
# Build both API and frontend images, then wait for rollouts

- name: Trigger API build
  ansible.builtin.command:
    cmd: >-
      oc start-build {{ app_name }}-api-build
      -n {{ target_namespace }}
      --kubeconfig={{ kubeconfig | expanduser }}
  changed_when: true

- name: Trigger frontend build
  ansible.builtin.command:
    cmd: >-
      oc start-build {{ app_name }}-frontend-build
      -n {{ target_namespace }}
      --kubeconfig={{ kubeconfig | expanduser }}
  changed_when: true

- name: Wait for API build to complete
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig }}"
    api_version: build.openshift.io/v1
    kind: Build
    namespace: "{{ target_namespace }}"
    label_selectors:
      - buildconfig={{ app_name }}-api-build
  register: api_build_poll
  until: >-
    api_build_poll.resources | default([]) | length > 0 and
    (api_build_poll.resources | default([])
     | sort(attribute='metadata.creationTimestamp')
     | last).status.phase in ['Complete', 'Failed', 'Error', 'Cancelled']
  retries: 60
  delay: 15
  failed_when: >-
    api_build_poll.resources | default([]) | length > 0 and
    (api_build_poll.resources | default([])
     | sort(attribute='metadata.creationTimestamp')
     | last).status.phase in ['Failed', 'Error', 'Cancelled']
  changed_when: false

- name: Wait for frontend build to complete
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig }}"
    api_version: build.openshift.io/v1
    kind: Build
    namespace: "{{ target_namespace }}"
    label_selectors:
      - buildconfig={{ app_name }}-frontend-build
  register: frontend_build_poll
  until: >-
    frontend_build_poll.resources | default([]) | length > 0 and
    (frontend_build_poll.resources | default([])
     | sort(attribute='metadata.creationTimestamp')
     | last).status.phase in ['Complete', 'Failed', 'Error', 'Cancelled']
  retries: 30
  delay: 10
  failed_when: >-
    frontend_build_poll.resources | default([]) | length > 0 and
    (frontend_build_poll.resources | default([])
     | sort(attribute='metadata.creationTimestamp')
     | last).status.phase in ['Failed', 'Error', 'Cancelled']
  changed_when: false

- name: Wait for new API rollout to complete
  ansible.builtin.command:
    cmd: >-
      oc rollout status deployment/{{ app_name }}-api
      -n {{ target_namespace }}
      --kubeconfig={{ kubeconfig | expanduser }}
      --timeout=300s
  changed_when: false
