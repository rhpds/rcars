---
# BuildRequest is a virtual resource posted to a subresource endpoint
# (/buildconfigs/{name}/instantiate) — not supported by kubernetes.core.k8s.
# oc start-build is the only practical trigger here.
- name: Trigger build for {{ app_name }}
  ansible.builtin.command:
    cmd: >-
      oc start-build {{ app_name }}
      -n {{ target_namespace }}
      --output=name
      --kubeconfig={{ kubeconfig | expanduser }}
  register: build_ref
  changed_when: true

- name: Wait for {{ app_name }} build to complete
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig }}"
    api_version: build.openshift.io/v1
    kind: Build
    namespace: "{{ target_namespace }}"
    name: "{{ build_ref.stdout | trim | regex_replace('^build\\.openshift\\.io/', '') }}"
  register: build_poll
  # Guard with 'is defined' — k8s_info may return a dict without 'resources'
  # on transient errors even with failed_when: false, causing an AttributeError
  # before Jinja2 filters can apply.
  until: >-
    build_poll.resources is defined and
    build_poll.resources | length > 0 and
    build_poll.resources[0].status.phase in ['Complete', 'Failed', 'Error', 'Cancelled']
  retries: 60
  delay: 15
  failed_when: >-
    build_poll.resources is defined and
    build_poll.resources | length > 0 and
    build_poll.resources[0].status.phase in ['Failed', 'Error', 'Cancelled']
  changed_when: false

- name: Restart {{ app_name }} deployment
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    api_version: apps/v1
    kind: Deployment
    namespace: "{{ target_namespace }}"
    name: "{{ app_name }}"
    definition:
      spec:
        template:
          metadata:
            annotations:
              kubectl.kubernetes.io/restartedAt: "{{ now(utc=True, fmt='%Y-%m-%dT%H:%M:%SZ') }}"
    merge_type: strategic-merge
  changed_when: true

- name: Wait for {{ app_name }} rollout to complete
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig }}"
    api_version: apps/v1
    kind: Deployment
    namespace: "{{ target_namespace }}"
    name: "{{ app_name }}"
  register: deployment_poll
  until: >-
    deployment_poll.resources is defined and
    deployment_poll.resources | length > 0 and
    (deployment_poll.resources[0].status.updatedReplicas | default(0) | int) ==
    (deployment_poll.resources[0].spec.replicas | default(1) | int) and
    (deployment_poll.resources[0].status.readyReplicas | default(0) | int) ==
    (deployment_poll.resources[0].spec.replicas | default(1) | int)
  retries: 20
  delay: 10
  changed_when: false
