---
- name: Trigger build for {{ app_name }}
  ansible.builtin.command:
    cmd: >-
      oc start-build {{ app_name }}
      -n {{ target_namespace }}
      --kubeconfig={{ kubeconfig | expanduser }}
  changed_when: true

- name: Wait for {{ app_name }} build to complete
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig }}"
    api_version: build.openshift.io/v1
    kind: Build
    namespace: "{{ target_namespace }}"
    label_selectors:
      - buildconfig={{ app_name }}
  register: build_poll
  until: >-
    build_poll.resources | default([]) | length > 0 and
    (build_poll.resources | default([])
     | sort(attribute='metadata.creationTimestamp')
     | last).status.phase in ['Complete', 'Failed', 'Error', 'Cancelled']
  retries: 60
  delay: 15
  failed_when: >-
    build_poll.resources | default([]) | length > 0 and
    (build_poll.resources | default([])
     | sort(attribute='metadata.creationTimestamp')
     | last).status.phase in ['Failed', 'Error', 'Cancelled']
  changed_when: false

- name: Restart {{ app_name }} deployment
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    api_version: apps/v1
    kind: Deployment
    namespace: "{{ target_namespace }}"
    name: "{{ app_name }}"
    definition:
      spec:
        template:
          metadata:
            annotations:
              kubectl.kubernetes.io/restartedAt: "{{ now(utc=True, fmt='%Y-%m-%dT%H:%M:%SZ') }}"
    merge_type: strategic-merge
  changed_when: true

- name: Wait for {{ app_name }} rollout to complete
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig }}"
    api_version: apps/v1
    kind: Deployment
    namespace: "{{ target_namespace }}"
    name: "{{ app_name }}"
  register: deployment_poll
  until: >-
    deployment_poll.resources | default([]) | length > 0 and
    (deployment_poll.resources[0].status.updatedReplicas | default(0) | int) ==
    (deployment_poll.resources[0].spec.replicas | default(1) | int) and
    (deployment_poll.resources[0].status.readyReplicas | default(0) | int) ==
    (deployment_poll.resources[0].spec.replicas | default(1) | int)
  retries: 20
  delay: 10
  changed_when: false
