---
- name: Record API deployment generation before build
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig }}"
    api_version: apps/v1
    kind: Deployment
    namespace: "{{ target_namespace }}"
    name: "{{ app_name }}-api"
  register: api_pre_build

- name: Trigger API build
  ansible.builtin.command:
    cmd: >-
      oc start-build {{ app_name }}-api-build
      -n {{ target_namespace }}
      --kubeconfig={{ kubeconfig | expanduser }}
  changed_when: true

- name: Wait for API build to complete
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig }}"
    api_version: build.openshift.io/v1
    kind: Build
    namespace: "{{ target_namespace }}"
    label_selectors:
      - buildconfig={{ app_name }}-api-build
  register: api_build_poll
  until: >-
    api_build_poll.resources | default([]) | length > 0 and
    (api_build_poll.resources | default([])
     | sort(attribute='metadata.creationTimestamp')
     | last).status.phase in ['Complete', 'Failed', 'Error', 'Cancelled']
  retries: 60
  delay: 15
  failed_when: >-
    api_build_poll.resources | default([]) | length > 0 and
    (api_build_poll.resources | default([])
     | sort(attribute='metadata.creationTimestamp')
     | last).status.phase in ['Failed', 'Error', 'Cancelled']
  changed_when: false

- name: Wait for API rollout
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig }}"
    api_version: apps/v1
    kind: Deployment
    namespace: "{{ target_namespace }}"
    name: "{{ app_name }}-api"
  register: api_rollout
  until: >-
    api_rollout.resources | default([]) | length > 0 and
    (api_rollout.resources[0].metadata.generation | default(0) | int) >
    (api_pre_build.resources[0].metadata.generation | default(0) | int) and
    (api_rollout.resources[0].status.observedGeneration | default(0) | int) ==
    (api_rollout.resources[0].metadata.generation | default(0) | int) and
    (api_rollout.resources[0].status.readyReplicas | default(0) | int) ==
    (api_rollout.resources[0].spec.replicas | default(1) | int) and
    (api_rollout.resources[0].status.updatedReplicas | default(0) | int) ==
    (api_rollout.resources[0].spec.replicas | default(1) | int)
  retries: 30
  delay: 15
  changed_when: false
