---
# Bootstrap RBAC for the rcars-mgmt-sa service account.
#
# Creates the SA in target_namespace, a scoped ClusterRole for
# cluster-level operations (namespaces, OAuthClients), and an admin
# RoleBinding in the target namespace.  Also creates a long-lived
# token Secret and writes a ready-to-use kubeconfig.
#
# Each env (dev, prod) gets its own SA in its own namespace.
# The ClusterRole and ClusterRoleBinding are shared (cluster-scoped).
#
# Idempotent — safe to run on every deploy.
#
# Prerequisites: the user running this must have cluster-admin or equivalent.
# One-time setup per env:
#   ansible-playbook ansible/deploy.yml -e env=dev -e kubeconfig=~/.kube/config --tags mgmt-rbac
#   ansible-playbook ansible/deploy.yml -e env=prod -e kubeconfig=~/.kube/config --tags mgmt-rbac
# Override output path with: -e mgmt_kubeconfig_output=~/somewhere/else.kubeconfig

- name: Set mgmt kubeconfig output path default
  ansible.builtin.set_fact:
    mgmt_kubeconfig_output: "{{ kubeconfig }}"
  when: mgmt_kubeconfig_output is not defined

- name: Ensure {{ target_namespace }} namespace exists
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ target_namespace }}"

- name: Ensure management SA exists in {{ target_namespace }}
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    state: present
    definition:
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: "{{ mgmt_service_account.name }}"
        namespace: "{{ target_namespace }}"

- name: Ensure management ClusterRole exists
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRole
      metadata:
        name: rcars-mgmt
      rules:
        - apiGroups: [""]
          resources: ["namespaces"]
          verbs: ["get", "list", "create", "update", "patch"]
        - apiGroups: ["oauth.openshift.io"]
          resources: ["oauthclients"]
          verbs: ["get", "list", "create", "update", "patch", "delete"]

- name: Ensure management ClusterRoleBinding exists
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: "rcars-mgmt-{{ env }}"
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: rcars-mgmt
      subjects:
        - kind: ServiceAccount
          name: "{{ mgmt_service_account.name }}"
          namespace: "{{ target_namespace }}"

- name: Ensure management SA has admin in {{ target_namespace }}
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: rcars-mgmt-admin
        namespace: "{{ target_namespace }}"
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: admin
      subjects:
        - kind: ServiceAccount
          name: "{{ mgmt_service_account.name }}"
          namespace: "{{ target_namespace }}"

# ── Long-lived token + kubeconfig generation ──────────────────────────────────

- name: Ensure long-lived token Secret exists
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: rcars-mgmt-sa-token
        namespace: "{{ target_namespace }}"
        annotations:
          kubernetes.io/service-account.name: "{{ mgmt_service_account.name }}"
      type: kubernetes.io/service-account-token

- name: Wait for token to be populated
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig }}"
    kind: Secret
    namespace: "{{ target_namespace }}"
    name: rcars-mgmt-sa-token
  register: token_secret
  until: token_secret.resources | length > 0 and token_secret.resources[0].data.token is defined
  retries: 12
  delay: 5

- name: Extract token from Secret
  ansible.builtin.set_fact:
    mgmt_sa_token: "{{ token_secret.resources[0].data.token | b64decode }}"

- name: Get cluster API server URL
  kubernetes.core.k8s_cluster_info:
    kubeconfig: "{{ kubeconfig }}"
  register: mgmt_cluster_info

- name: Ensure output directory exists
  ansible.builtin.file:
    path: "{{ mgmt_kubeconfig_output | expanduser | dirname }}"
    state: directory
    mode: "0700"

- name: Write rcars-mgmt kubeconfig
  ansible.builtin.copy:
    dest: "{{ mgmt_kubeconfig_output | expanduser }}"
    mode: "0600"
    content: |
      apiVersion: v1
      kind: Config
      clusters:
      - cluster:
          server: {{ mgmt_cluster_info.connection.host }}
        name: rcars
      contexts:
      - context:
          cluster: rcars
          namespace: {{ target_namespace }}
          user: {{ mgmt_service_account.name }}
        name: rcars
      current-context: rcars
      users:
      - name: {{ mgmt_service_account.name }}
        user:
          token: {{ mgmt_sa_token }}

- name: Show kubeconfig path
  ansible.builtin.debug:
    msg: |
      Management kubeconfig written to: {{ mgmt_kubeconfig_output }}
      Default namespace: {{ target_namespace }}

      Test with:
        KUBECONFIG={{ mgmt_kubeconfig_output | expanduser }} oc whoami
        KUBECONFIG={{ mgmt_kubeconfig_output | expanduser }} oc get pods -n {{ target_namespace }}
