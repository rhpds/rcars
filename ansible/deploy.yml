---
# RCARS OCP Deployment Playbook
#
# Automates the full setup from empty namespace to running instance.
# All tasks are idempotent — running the playbook twice produces the same result.
#
# Usage:
#   # One-time bootstrap: create SA, RBAC, kubeconfig (requires cluster-admin)
#   ansible-playbook ansible/deploy.yml -e env=dev -e kubeconfig=~/.kube/config --tags mgmt-rbac
#
#   # Full deploy (infra + app + build + migrate) — works for first-time or updates
#   ansible-playbook ansible/deploy.yml -e env=prod --tags deploy
#
#   # Individual operations
#   ansible-playbook ansible/deploy.yml -e env=dev --tags build-frontend
#   ansible-playbook ansible/deploy.yml -e env=dev --tags build-api
#   ansible-playbook ansible/deploy.yml -e env=dev --tags builds          # Build all
#   ansible-playbook ansible/deploy.yml -e env=dev --tags apply           # App manifests only (no build)
#   ansible-playbook ansible/deploy.yml -e env=dev --tags migrate         # Just run migrations
#   ansible-playbook ansible/deploy.yml -e env=dev --tags update          # Build all + migrate (correct order)
#
# Prerequisites:
#   - ansible-galaxy collection install -r ansible/requirements.yml
#   - cp ansible/vars/dev.yml.example ansible/vars/dev.yml  (fill in secrets)
#   - Run mgmt-rbac tag once with personal kubeconfig

- name: Deploy RCARS to OpenShift
  hosts: localhost
  connection: local
  gather_facts: false
  collections:
    - kubernetes.core

  vars_files:
    - vars/common.yml
    - "vars/{{ env }}.yml"

  pre_tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - env is defined
          - target_namespace is defined
          - kubeconfig is defined
          - pg_password is defined
          - pg_password != 'CHANGEME'
          - oauth_client_secret is defined
          - oauth_client_secret != 'CHANGEME'
          - oauth_cookie_secret is defined
          - oauth_cookie_secret != 'CHANGEME'
          - cluster_domain is defined
          - "'your-cluster' not in cluster_domain"
        fail_msg: >
          Missing or placeholder variables detected. Fill in all CHANGEME values
          in ansible/vars/{{ env | default('dev') }}.yml and set cluster_domain
          to your actual cluster domain.
      tags: [always]

    - name: Verify kubeconfig exists
      ansible.builtin.stat:
        path: "{{ kubeconfig }}"
      register: kubeconfig_file
      tags: [always]

    - name: Fail if kubeconfig not found
      ansible.builtin.fail:
        msg: "Kubeconfig not found at {{ kubeconfig }}"
      when: not kubeconfig_file.stat.exists
      tags: [always]

    - name: Verify cluster connectivity
      kubernetes.core.k8s_cluster_info:
        kubeconfig: "{{ kubeconfig }}"
      register: cluster_info
      tags: [always]

    - name: Load Babylon kubeconfig contents
      ansible.builtin.set_fact:
        babylon_kubeconfig_content: "{{ lookup('file', babylon_kubeconfig_path) }}"
      when: babylon_kubeconfig_path is defined and babylon_kubeconfig_path != ''
      tags: [always]

  tasks:
    - name: Bootstrap management RBAC
      ansible.builtin.include_tasks:
        file: tasks/mgmt-rbac.yml
        apply:
          tags: [mgmt-rbac]
      tags: [mgmt-rbac]

    - name: Create namespace
      ansible.builtin.include_tasks:
        file: tasks/namespace.yml
        apply:
          tags: [deploy, apply]
      tags: [deploy, apply]

    - name: Apply infra manifests
      ansible.builtin.include_tasks:
        file: tasks/apply-infra.yml
        apply:
          tags: [deploy, apply]
      tags: [deploy, apply]

    - name: Apply app manifests
      ansible.builtin.include_tasks:
        file: tasks/apply-manifests.yml
        apply:
          tags: [deploy, apply]
      tags: [deploy, apply]

    - name: Build all (API + frontend)
      ansible.builtin.include_tasks:
        file: tasks/wait-for-builds.yml
        apply:
          tags: [deploy, builds]
      tags: [deploy, builds]

    - name: Build frontend only
      ansible.builtin.include_tasks:
        file: tasks/build-frontend.yml
        apply:
          tags: [build-frontend, update]
      tags: [build-frontend, update]

    - name: Build API + workers only
      ansible.builtin.include_tasks:
        file: tasks/build-api.yml
        apply:
          tags: [build-api, update]
      tags: [build-api, update]

    - name: Run database migrations
      block:
        - name: Wait for API rollout to complete
          kubernetes.core.k8s_info:
            kubeconfig: "{{ kubeconfig }}"
            api_version: apps/v1
            kind: Deployment
            namespace: "{{ target_namespace }}"
            name: "{{ app_name }}-api"
          register: api_deploy
          until: >-
            api_deploy.resources | default([]) | length > 0 and
            (api_deploy.resources[0].status.readyReplicas | default(0) | int) ==
            (api_deploy.resources[0].spec.replicas | default(1) | int) and
            (api_deploy.resources[0].status.updatedReplicas | default(0) | int) ==
            (api_deploy.resources[0].spec.replicas | default(1) | int)
          retries: 30
          delay: 15

        - name: Find running API pod
          kubernetes.core.k8s_info:
            kubeconfig: "{{ kubeconfig }}"
            kind: Pod
            namespace: "{{ target_namespace }}"
            label_selectors:
              - "app={{ app_name }}"
              - "component=api"
          register: app_pods
          until: >-
            app_pods.resources | default([]) | length > 0 and
            (app_pods.resources
             | selectattr('status.phase', 'eq', 'Running')
             | rejectattr('metadata.deletionTimestamp', 'defined')
             | selectattr('status.containerStatuses', 'defined')
             | list | length > 0) and
            (app_pods.resources
             | selectattr('status.phase', 'eq', 'Running')
             | rejectattr('metadata.deletionTimestamp', 'defined')
             | selectattr('status.containerStatuses', 'defined')
             | first).status.containerStatuses[0].ready | bool
          retries: 20
          delay: 10

        - name: Select migration target pod
          ansible.builtin.set_fact:
            migrate_pod: >-
              {{ (app_pods.resources
                  | selectattr('status.phase', 'eq', 'Running')
                  | rejectattr('metadata.deletionTimestamp', 'defined')
                  | selectattr('status.containerStatuses', 'defined')
                  | first).metadata.name }}

        - name: Run database schema setup (create tables)
          kubernetes.core.k8s_exec:
            kubeconfig: "{{ kubeconfig }}"
            namespace: "{{ target_namespace }}"
            pod: "{{ migrate_pod }}"
            command: rcars init-db
          register: schema_result
          changed_when: false

        - name: Run alembic migrations (alter existing tables)
          kubernetes.core.k8s_exec:
            kubeconfig: "{{ kubeconfig }}"
            namespace: "{{ target_namespace }}"
            pod: "{{ migrate_pod }}"
            command: alembic upgrade head
          register: migrate_result
          changed_when: "'Running upgrade' in (migrate_result.stdout | default(''))"

        - name: Get expected alembic version from pod
          kubernetes.core.k8s_exec:
            kubeconfig: "{{ kubeconfig }}"
            namespace: "{{ target_namespace }}"
            pod: "{{ migrate_pod }}"
            command: >-
              python3 -c "import os; files = sorted(f for f in os.listdir('/opt/app-root/src/alembic/versions') if f.endswith('.py') and not f.startswith('_')); print(files[-1].split('_')[0])"
          register: expected_version

        - name: Verify alembic migration applied
          kubernetes.core.k8s_exec:
            kubeconfig: "{{ kubeconfig }}"
            namespace: "{{ target_namespace }}"
            pod: "{{ migrate_pod }}"
            command: >-
              python3 -c "import psycopg, os; conn = psycopg.connect(os.environ['RCARS_DATABASE_URL']); print(conn.execute('SELECT version_num FROM alembic_version').fetchone()[0]); conn.close()"
          register: actual_version
          until: actual_version.stdout | default('') | trim == expected_version.stdout | default('') | trim
          retries: 6
          delay: 30
          failed_when: actual_version.stdout | default('') | trim != expected_version.stdout | default('') | trim
      tags: [deploy, migrate, update]

  post_tasks:
    - name: Get pod status
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        kind: Pod
        namespace: "{{ target_namespace }}"
        label_selectors:
          - "app={{ app_name }}"
      register: final_pods
      tags: [always]

    - name: Deployment summary
      ansible.builtin.debug:
        msg: |
          === RCARS {{ env }} deployment complete ===

          Namespace: {{ target_namespace }}
          URL:       https://{{ frontend_host }}

          Pods:
          {% for pod in final_pods.resources | sort(attribute='metadata.name') %}
            {{ pod.metadata.name }}  {{ pod.status.phase }}
          {% endfor %}
      tags: [always]
