---
# RCARS OCP Deployment Playbook
#
# Automates the full setup from empty namespace to running instance.
# All tasks are idempotent — running the playbook twice produces the same result.
#
# Usage:
#   ansible-playbook ansible/deploy.yml -e env=dev -e kubeconfig=~/.kube/config --tags mgmt-rbac
#                                                        # One-time bootstrap: create SA, RBAC, kubeconfig
#   ansible-playbook ansible/deploy.yml -e env=dev --tags bootstrap # Apply infra (ImageStream, BuildConfig, Secrets, PG, OAuthClient)
#   ansible-playbook ansible/deploy.yml -e env=dev --tags apply          # Apply app manifests + migrate (no build)
#   ansible-playbook ansible/deploy.yml -e env=dev --tags update         # Full update: apply + build + migrate
#   ansible-playbook ansible/deploy.yml -e env=prod --tags update        # Full prod update
#   ansible-playbook ansible/deploy.yml -e env=dev --tags builds          # Build all + rollout
#   ansible-playbook ansible/deploy.yml -e env=dev --tags build-frontend  # Rebuild frontend only
#   ansible-playbook ansible/deploy.yml -e env=dev --tags build-api       # Rebuild API + workers
#   ansible-playbook ansible/deploy.yml -e env=dev --tags migrate         # Just run Alembic migrations
#
# Prerequisites:
#   - ansible-galaxy collection install -r ansible/requirements.yml
#   - cp ansible/vars/dev.yml.example ansible/vars/dev.yml  (fill in secrets)
#   - Run mgmt-rbac tag once with personal kubeconfig, then set kubeconfig: ~/secrets/rcars-mgmt.kubeconfig

- name: Deploy RCARS to OpenShift
  hosts: localhost
  connection: local
  gather_facts: false
  collections:
    - kubernetes.core

  vars_files:
    - vars/common.yml
    - "vars/{{ env }}.yml"

  pre_tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - env is defined
          - target_namespace is defined
          - kubeconfig is defined
          - pg_password is defined
          - pg_password != 'CHANGEME'
          - oauth_client_secret is defined
          - oauth_client_secret != 'CHANGEME'
          - oauth_cookie_secret is defined
          - oauth_cookie_secret != 'CHANGEME'
          - cluster_domain is defined
          - "'your-cluster' not in cluster_domain"
        fail_msg: >
          Missing or placeholder variables detected. Fill in all CHANGEME values
          in ansible/vars/{{ env | default('dev') }}.yml and set cluster_domain
          to your actual cluster domain.
      tags: [always]

    - name: Verify kubeconfig exists
      ansible.builtin.stat:
        path: "{{ kubeconfig }}"
      register: kubeconfig_file
      tags: [always]

    - name: Fail if kubeconfig not found
      ansible.builtin.fail:
        msg: "Kubeconfig not found at {{ kubeconfig }}"
      when: not kubeconfig_file.stat.exists
      tags: [always]

    - name: Verify cluster connectivity
      kubernetes.core.k8s_cluster_info:
        kubeconfig: "{{ kubeconfig }}"
      register: cluster_info
      tags: [always]

    - name: Load Babylon kubeconfig contents
      ansible.builtin.set_fact:
        babylon_kubeconfig_content: "{{ lookup('file', babylon_kubeconfig_path) }}"
      when: babylon_kubeconfig_path is defined and babylon_kubeconfig_path != ''
      tags: [apply, update]

  tasks:
    - name: Bootstrap management RBAC
      ansible.builtin.include_tasks:
        file: tasks/mgmt-rbac.yml
        apply:
          tags: [mgmt-rbac]
      tags: [mgmt-rbac]

    - name: Create namespace
      ansible.builtin.include_tasks:
        file: tasks/namespace.yml
        apply:
          tags: [namespace, apply, update]
      tags: [namespace, apply, update]

    - name: Apply infra manifests
      ansible.builtin.include_tasks:
        file: tasks/apply-infra.yml
        apply:
          tags: [bootstrap]
      tags: [bootstrap]

    - name: Apply app manifests
      ansible.builtin.include_tasks:
        file: tasks/apply-manifests.yml
        apply:
          tags: [apply, update]
      tags: [apply, update]

    - name: Wait for builds
      ansible.builtin.include_tasks:
        file: tasks/wait-for-builds.yml
        apply:
          tags: [builds, update]
      tags: [builds, update]

    - name: Run database migrations
      block:
        - name: Wait for ready app pod
          kubernetes.core.k8s_info:
            kubeconfig: "{{ kubeconfig }}"
            kind: Pod
            namespace: "{{ target_namespace }}"
            label_selectors:
              - "app={{ app_name }}"
              - "component=api"
          register: app_pods
          until: >-
            app_pods.resources | default([]) | length > 0 and
            (app_pods.resources
             | selectattr('status.phase', 'eq', 'Running')
             | selectattr('status.containerStatuses', 'defined')
             | list | length > 0) and
            (app_pods.resources
             | selectattr('status.phase', 'eq', 'Running')
             | selectattr('status.containerStatuses', 'defined')
             | first).status.containerStatuses[0].ready | bool
          retries: 20
          delay: 15
          failed_when: app_pods.resources | default([]) | length == 0

        - name: Run database schema setup
          kubernetes.core.k8s_exec:
            kubeconfig: "{{ kubeconfig }}"
            namespace: "{{ target_namespace }}"
            pod: >-
              {{ (app_pods.resources
                  | selectattr('status.phase', 'eq', 'Running')
                  | selectattr('status.containerStatuses', 'defined')
                  | first).metadata.name }}
            command: rcars status
          register: migrate_result
          changed_when: false
      tags: [migrate, apply, update]

  post_tasks:
    - name: Get pod status
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        kind: Pod
        namespace: "{{ target_namespace }}"
        label_selectors:
          - "app={{ app_name }}"
      register: final_pods
      tags: [always]

    - name: Deployment summary
      ansible.builtin.debug:
        msg: |
          === RCARS {{ env }} deployment complete ===

          Namespace: {{ target_namespace }}
          URL:       https://{{ frontend_host }}

          Pods:
          {% for pod in final_pods.resources | sort(attribute='metadata.name') %}
            {{ pod.metadata.name }}  {{ pod.status.phase }}
          {% endfor %}
      tags: [always]
