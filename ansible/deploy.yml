---
# RCARS OCP Deployment Playbook
#
# Automates the full setup from empty namespace to running instance.
# All tasks are idempotent — running the playbook twice produces the same result.
# Every tag applies all manifests first so infra and app state never diverge.
#
# Usage:
#   # One-time bootstrap: create SA, RBAC, kubeconfig (requires cluster-admin)
#   ansible-playbook ansible/deploy.yml -e env=dev --tags mgmt-rbac -e kubeconfig=~/.kube/config
#
#   # Full deploy (manifests + build API + build frontend + migrate + smoke test)
#   ansible-playbook ansible/deploy.yml -e env=dev --tags full
#
#   # API only (manifests + build API + migrate + smoke test)
#   ansible-playbook ansible/deploy.yml -e env=dev --tags api
#
#   # Frontend only (manifests + build frontend + smoke test)
#   ansible-playbook ansible/deploy.yml -e env=dev --tags frontend
#
#   # Config only (manifests only — env vars, user lists, secrets, no builds)
#   ansible-playbook ansible/deploy.yml -e env=dev --tags apply-config
#
# Prerequisites:
#   - ansible-galaxy collection install -r ansible/requirements.yml
#   - cp ansible/vars/dev.yml.example ansible/vars/dev.yml  (fill in secrets)
#   - Run mgmt-rbac tag once with personal kubeconfig

- name: Deploy RCARS to OpenShift
  hosts: localhost
  connection: local
  gather_facts: false
  collections:
    - kubernetes.core

  vars_files:
    - vars/common.yml
    - "vars/{{ env }}.yml"

  pre_tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - env is defined
          - target_namespace is defined
          - kubeconfig is defined
          - pg_password is defined
          - pg_password != 'CHANGEME'
          - oauth_client_secret is defined
          - oauth_client_secret != 'CHANGEME'
          - oauth_cookie_secret is defined
          - oauth_cookie_secret != 'CHANGEME'
          - cluster_domain is defined
          - "'your-cluster' not in cluster_domain"
        fail_msg: >
          Missing or placeholder variables detected. Fill in all CHANGEME values
          in ansible/vars/{{ env | default('dev') }}.yml and set cluster_domain
          to your actual cluster domain.
      tags: [always]

    - name: Verify kubeconfig exists
      ansible.builtin.stat:
        path: "{{ kubeconfig }}"
      register: kubeconfig_file
      tags: [always]

    - name: Fail if kubeconfig not found
      ansible.builtin.fail:
        msg: "Kubeconfig not found at {{ kubeconfig }}"
      when: not kubeconfig_file.stat.exists
      tags: [always]

    - name: Verify cluster connectivity
      kubernetes.core.k8s_cluster_info:
        kubeconfig: "{{ kubeconfig }}"
      register: cluster_info
      tags: [always]

    - name: Load Babylon kubeconfig contents
      ansible.builtin.set_fact:
        babylon_kubeconfig_content: "{{ lookup('file', babylon_kubeconfig_path) }}"
      when: babylon_kubeconfig_path is defined and babylon_kubeconfig_path != ''
      tags: [always]

  tasks:
    # ── One-time bootstrap ──
    - name: Bootstrap management RBAC
      ansible.builtin.include_tasks:
        file: tasks/mgmt-rbac.yml
        apply:
          tags: [mgmt-rbac]
      tags: [mgmt-rbac]

    # ── Apply manifests (runs on every tag except mgmt-rbac) ──
    - name: Create namespace
      ansible.builtin.include_tasks:
        file: tasks/namespace.yml
        apply:
          tags: [full, api, frontend, apply-config]
      tags: [full, api, frontend, apply-config]

    - name: Apply infra manifests
      ansible.builtin.include_tasks:
        file: tasks/apply-infra.yml
        apply:
          tags: [full, api, frontend, apply-config]
      tags: [full, api, frontend, apply-config]

    - name: Apply app manifests
      ansible.builtin.include_tasks:
        file: tasks/apply-manifests.yml
        apply:
          tags: [full, api, frontend, apply-config]
      tags: [full, api, frontend, apply-config]

    # ── Build API ──
    - name: Build API + workers
      ansible.builtin.include_tasks:
        file: tasks/build-api.yml
        apply:
          tags: [full, api]
      tags: [full, api]

    # ── Build frontend ──
    - name: Build frontend
      ansible.builtin.include_tasks:
        file: tasks/build-frontend.yml
        apply:
          tags: [full, frontend]
      tags: [full, frontend]

    # ── Database migrations (after API build so pod has new code) ──
    - name: Run database migrations
      block:
        - name: Wait for API rollout to complete
          ansible.builtin.command:
            cmd: >-
              oc rollout status deployment/{{ app_name }}-api
              -n {{ target_namespace }}
              --kubeconfig={{ kubeconfig | expanduser }}
              --timeout=300s
          changed_when: false

        - name: Find running API pod
          ansible.builtin.command:
            cmd: >-
              oc get pods -n {{ target_namespace }}
              --kubeconfig={{ kubeconfig | expanduser }}
              -l app={{ app_name }},component=api
              --field-selector=status.phase=Running
              --no-headers -o custom-columns=NAME:.metadata.name
          register: app_pods
          until: app_pods.stdout_lines | default([]) | length > 0
          retries: 10
          delay: 10

        - name: Select migration target pod
          ansible.builtin.set_fact:
            migrate_pod: "{{ app_pods.stdout_lines[0] }}"

        - name: Run database schema setup (create tables)
          kubernetes.core.k8s_exec:
            kubeconfig: "{{ kubeconfig }}"
            namespace: "{{ target_namespace }}"
            pod: "{{ migrate_pod }}"
            command: rcars init-db
          register: schema_result
          changed_when: false

        - name: Run alembic migrations (alter existing tables)
          kubernetes.core.k8s_exec:
            kubeconfig: "{{ kubeconfig }}"
            namespace: "{{ target_namespace }}"
            pod: "{{ migrate_pod }}"
            command: alembic upgrade head
          register: migrate_result
          changed_when: "'Running upgrade' in (migrate_result.stdout | default(''))"

        - name: Get expected alembic head from code
          kubernetes.core.k8s_exec:
            kubeconfig: "{{ kubeconfig }}"
            namespace: "{{ target_namespace }}"
            pod: "{{ migrate_pod }}"
            command: alembic heads --resolve-dependencies
          register: expected_version

        - name: Get current alembic version from database
          kubernetes.core.k8s_exec:
            kubeconfig: "{{ kubeconfig }}"
            namespace: "{{ target_namespace }}"
            pod: "{{ migrate_pod }}"
            command: alembic current
          register: actual_version
          until: expected_version.stdout | default('') | trim in (actual_version.stdout | default(''))
          retries: 6
          delay: 30
          failed_when: expected_version.stdout | default('') | trim not in (actual_version.stdout | default(''))
      tags: [full, api]

    # ── Smoke test ──
    - name: Advisor smoke test (end-to-end LLM verification)
      ansible.builtin.include_tasks:
        file: tasks/smoke-test.yml
        apply:
          tags: [full, api, frontend]
      tags: [full, api, frontend]

  post_tasks:
    - name: Get pod status
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        kind: Pod
        namespace: "{{ target_namespace }}"
        label_selectors:
          - "app={{ app_name }}"
      register: final_pods
      tags: [always]

    - name: Deployment summary
      ansible.builtin.debug:
        msg: |
          === RCARS {{ env }} deployment complete ===

          Namespace: {{ target_namespace }}
          URL:       https://{{ frontend_host }}

          Pods:
          {% for pod in final_pods.resources | sort(attribute='metadata.name') %}
            {{ pod.metadata.name }}  {{ pod.status.phase }}
          {% endfor %}
      tags: [always]
