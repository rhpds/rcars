---
# RCARS shared deployment variables
# Environment-specific vars override these in dev.yml / prod.yml

app_name: rcars
app_port: 8080

# Management service account (lives in target_namespace, one per env)
mgmt_service_account:
  name: rcars-mgmt-sa

# Container images
pg_image: pgvector/pgvector:pg16
redis_image: "registry.redhat.io/rhel9/redis-7"
oauth_proxy_image: "registry.redhat.io/openshift4/ose-oauth-proxy-rhel9:latest"

# PostgreSQL
pg_port: 5432
pg_user: rcars
pg_database: rcars
pg_pvc_size: 20Gi
pg_storage_class: ocs-storagecluster-ceph-rbd

# Redis
redis_pvc_size: 1Gi
# redis_password: set in dev.yml / prod.yml (required)

# Vertex AI
vertex_region: us-east5

# Cluster — must be set in env vars file (e.g. apps.ocpv-infra01.dal12.infra.demo.redhat.com)
# cluster_domain:

# App config defaults
stale_days: 3
curator_emails: []
admin_emails: []

# Scheduled maintenance pipeline (runs in scan-worker via arq cron)
pipeline_enabled: true
pipeline_hour: 4
pipeline_minute: 0

# Worker concurrency (max simultaneous jobs per pod)
scan_max_jobs: 5
recommend_max_jobs: 15

# Scaling (pod replicas)
api_replicas: 1
scan_worker_replicas: 1
recommend_worker_replicas: 1
frontend_replicas: 1

# Resource limits
api_cpu_request: 500m
api_cpu_limit: "2"
api_memory_request: 1Gi
api_memory_limit: 4Gi

worker_cpu_request: 500m
worker_cpu_limit: "2"
worker_memory_request: 1Gi
worker_memory_limit: 4Gi

recommend_worker_cpu_request: 250m
recommend_worker_cpu_limit: "1"
recommend_worker_memory_request: 1Gi
recommend_worker_memory_limit: 2Gi

frontend_cpu_request: 100m
frontend_cpu_limit: 500m
frontend_memory_request: 128Mi
frontend_memory_limit: 256Mi

redis_cpu_request: 100m
redis_cpu_limit: 500m
redis_memory_request: 256Mi
redis_memory_limit: 512Mi

# API external route (disabled by default — cluster-internal only)
rcars_api_external_route: false
