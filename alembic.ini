[alembic]
script_location = alembic
prepend_sys_path = .

# Default URL for local dev — overridden by env.py reading RCARS_DATABASE_URL
sqlalchemy.url = postgresql://rcars:dev@localhost:5432/rcars

[loggers]
keys = root,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
