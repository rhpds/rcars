name: Trigger OpenShift Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger OpenShift build webhook
        run: |
          curl -s -X POST "${{ secrets.OPENSHIFT_BUILD_WEBHOOK_URL }}"
