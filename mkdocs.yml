site_name: RCARS
site_description: RHDP Content Advisory & Recommendation System
site_author: Red Hat Demo Platform Team
repo_url: https://github.com/rhpds/rcars
repo_name: rhpds/rcars
site_url: https://rhpds.github.io/rcars/

docs_dir: docs
site_dir: site
exclude_docs: |
  superpowers/

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font: false
  features:
    - navigation.top
    - navigation.sections
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

extra_css:
  - stylesheets/rcars.css

nav:
  - Home: index.md
  - Overview: overview.md
  - Architecture:
      - System Design: architecture/system-design.md
      - Deployment: architecture/deployment.md
  - User Guides:
      - Web UI Guide: user/web-guide.md
  - Admin Guides:
      - CLI Reference: admin/cli-guide.md
      - Token Usage: admin/token-usage.md
      - Operations: admin/operations.md
      - Development: admin/development.md

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
